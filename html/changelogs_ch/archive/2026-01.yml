2026-01-13:
  CHOMPStation2StaffMirrorBot:
  - rscadd: Ckeyless simplemobs will drop bones on digestion if the preds belly's
      'leave remains' are set to true.
  Diana:
  - image: Giftboxes can now be multiple different colors.
  - bugfix: Borgs can grab giftboxes in their cold, robotic hands.
  - bugfix: Grit can be selected once more.
  - qol: Health scanners now tell you how much bloodloss an internal bleed is causing.
  - refactor: Chemicals now have scannable 'tiers', starting at tier 0 (medications)
      and scaling up to tier 3 (Secret chems). The tiers of health analyzers can scan
      these.
  - qol: Upgrading the bodyscanner now properly does something - it allows you to
      identify secret chemicals in someone's system.
  - bugfix: A lot of chemicals that were previously marked as 'unscannable' are now
      properly scannable.
  - bugfix: Amatoxin will properly nuke you when it finishes processing in your system
  - bugfix: FAKEDEATH is now more believable.
  - bugfix: Synap now properly works when eaten
  - refactor: Bloodloss is refactored to operate a bit better.
  - rscadd: Bodyscanner is now upgradable and will show hidden (unscannable) chemicals.
  - bugfix: Unscannable (hidden) chemicals no longer show up on bodyscanner by default,
      instead requiring upgrading it.
  - qol: Archeological finds can now be deconstructed for points instead of having
      to destroy the artifact before you know what it is.
  Guti:
  - rscadd: Added diamond dimensional anomaly theme
  - bugfix: Fixed snow theme dimensional anomaly not changing wall/doors
  - bugfix: Fixed anomaly placer picking non-station areas
  - bugfix: Fixed reactive armour being able to be printed in any departmental lathe
  Will:
  - bugfix: Drone ventcrawling no longer using slime's vent crawling restriction list
